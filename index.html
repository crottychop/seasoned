<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seasoned</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=46" />
</head>
<body>

  <!-- ── Top bar ─────────────────────────────────────────── -->
  <header class="topbar">
    <nav class="topbar-nav" aria-label="Primary">
      <button class="topbar-link" data-view="recipes">recipes</button>
      <button class="topbar-link" data-view="pantry">pantry</button>
    </nav>
  </header>

  <!-- ══ HOME view — the "Kain Tayo" card (Square-style image trail) ═ -->
  <main id="view-home" class="view view-home">
    <section class="hero" id="hero">
      <div class="hero-content">
        <h1 class="hero-title">
          <span>kain tayo</span>
          <span>cholo khai</span>
          <span class="lets-eat">let's eat</span>
        </h1>
        <nav class="home-paths" aria-label="Where to next">
          <button class="home-path" data-view="recipes">
            <span class="home-path-label">what to make</span>
            <span class="home-path-sub">recipes</span>
          </button>
          <button class="home-path" data-view="pantry">
            <span class="home-path-label">what we have</span>
            <span class="home-path-sub">pantry</span>
          </button>
        </nav>
      </div>
      <div class="slideshow" id="slideshow" aria-hidden="true"><!-- floating video card --></div>
      <p class="hero-byline">from the table of najeer, kate, &amp; appa</p>

      <aside class="dispatch-note" id="dispatch-note">
        <button class="dispatch-note-close" id="dispatch-note-close" aria-label="Dismiss">&#x2715;</button>
        <p class="dispatch-note-title">Happy Father's Day to the best dog daddy to Appa</p>
        <p class="dispatch-note-copy">Thank you for cooking and sharing your love of food with me</p>
      </aside>
    </section>
  </main>

  <!-- ══ RECIPES view — filterable grid (to be restyled next) ═ -->
  <main id="view-recipes" class="view" hidden>
    <section class="section">
      <div class="section-head">
        <h2 class="section-title">recipes</h2>
        <span class="result-count" id="result-count"></span>
      </div>

      <div class="category-tabs" id="category-tabs" role="tablist" aria-label="Filter by category"><!-- app.js --></div>
      <select id="category" hidden><option value="">All categories</option></select>

      <div class="filters" role="search">
        <div class="filter-group filter-search">
          <label for="search">Search</label>
          <input type="text" id="search" placeholder="Search recipes or ingredients" />
        </div>
        <div class="filter-group">
          <label for="cuisine">Cuisine</label>
          <select id="cuisine"><option value="">All cuisines</option></select>
        </div>
        <div class="filter-group">
          <label for="time">Cook time</label>
          <select id="time">
            <option value="">Any time</option>
            <option value="30">Under 30 min</option>
            <option value="60">Under 1 hr</option>
            <option value="120">Under 2 hrs</option>
          </select>
        </div>
      </div>

      <div class="active-chips" id="active-chips" aria-live="polite"><!-- app.js --></div>
      <div class="recipe-grid" id="recipe-grid" aria-live="polite"><!-- app.js --></div>
    </section>
  </main>

  <!-- ══ PANTRY view — shared fridge/pantry inventory ════════ -->
  <main id="view-pantry" class="view" hidden>
    <section class="section">
      <div class="section-head">
        <h2 class="section-title">pantry</h2>
        <div class="pantry-tools">
          <button class="ing-toggle" id="pantry-view-toggle">View as list</button>
          <span class="result-count" id="pantry-count"></span>
        </div>
      </div>
      <p class="pantry-intro">Tap anything you're <strong>out of</strong> — recipes will quietly flag what you need.</p>
      <p class="cook-line" id="cook-shelf"><!-- app.js: what can we make? --></p>
      <div class="pantry-grid" id="pantry-grid" aria-live="polite"><!-- app.js --></div>
    </section>
  </main>

  <!-- ── Recipe modal ────────────────────────────────────── -->
  <dialog id="recipe-modal" aria-modal="true">
    <button class="recipe-view-back" id="modal-back" aria-label="Back">&#8592;&nbsp; Back</button>
    <button class="recipe-view-close" id="modal-close" aria-label="Close">&#x2715;</button>
    <div id="modal-content"></div>
  </dialog>

  <!-- Pantry sync: paste your Firebase web config below to switch the pantry from
       this-device (localStorage) to shared/live across the family. Until then it
       works locally. See the setup steps Claude gave you. -->
  <script>
    window.SEASONED_FIREBASE = {
      apiKey: "AIzaSyDiSe505RTCo_xnHtViyfq4ub447003-Uk",
      authDomain: "fufafood.firebaseapp.com",
      databaseURL: "https://fufafood-default-rtdb.firebaseio.com",
      projectId: "fufafood",
      storageBucket: "fufafood.firebasestorage.app",
      messagingSenderId: "388522990824",
      appId: "1:388522990824:web:8e1278bba569971f0a7d5d"
    };
  </script>
  <script src="js/app.js?v=46"></script>
</body>
</html>
